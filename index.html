<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yassir Eddakhouche - Ingénieur Informatique & Réseau</title>
    <meta name="description" content="Portfolio de Yassir Eddakhouche, Ingénieur d'État en Informatique & Réseau spécialisé en développement full-stack, Spring Boot, React et solutions NAC" />
    <meta name="author" content="Yassir Eddakhouche" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Prefetch external CDNs used for cube logos -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://cdn.simpleicons.org" />

    <!-- Preload above-fold profile image -->
    <link rel="preload" as="image" href="/profile.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Prevent white flash: apply dark class and background before React loads -->
    <style>html { background: hsl(225,55%,4%); }</style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || 'dark';
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <meta property="og:title" content="Yassir Eddakhouche - Ingénieur Informatique & Réseau" />
    <meta property="og:description" content="Portfolio de Yassir Eddakhouche, Ingénieur d'État en Informatique & Réseau spécialisé en développement full-stack" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://k.top4top.io/p_3576tg34i1.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yassir Eddakhouche - Ingénieur Informatique & Réseau</title>
    <meta name="description" content="Portfolio de Yassir Eddakhouche, Ingénieur d'État en Informatique & Réseau spécialisé en développement full-stack, Spring Boot, React et solutions NAC" />
    <meta name="author" content="Yassir Eddakhouche" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Preload above-fold assets so they count toward window.load -->
    <link rel="preload" as="image" href="/profile.jpg" />
    <link rel="preload" as="image" href="/logos/react.svg" />
    <link rel="preload" as="image" href="/logos/odoo.svg" />
    <link rel="preload" as="image" href="/logos/spring.svg" />
    <link rel="preload" as="image" href="/logos/python.svg" />
    <link rel="preload" as="image" href="/logos/postgresql.svg" />
    <link rel="preload" as="image" href="/logos/javascript.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Prevent flash before React loads — matches both themes -->
    <style>
      html       { background: hsl(225,55%,4%); }
      html.light { background: hsl(210,30%,97%); }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || 'dark';
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <meta property="og:title" content="Yassir Eddakhouche - Ingénieur Informatique & Réseau" />
    <meta property="og:description" content="Portfolio de Yassir Eddakhouche, Ingénieur d'État en Informatique & Réseau spécialisé en développement full-stack" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://k.top4top.io/p_3576tg34i1.jpg" />
  </head>

  <body>
    <!-- Neon E loader — loops until site is 100% ready -->
    <div id="loader" style="position:fixed;inset:0;z-index:99999;background:hsl(225,55%,4%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.7s ease;">

      <svg viewBox="0 0 70 90" width="100" height="128" fill="none" stroke="#00d4ff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" style="animation:neonGlow 1.8s ease-in-out infinite;">
        <line x1="15" y1="10" x2="15" y2="80" stroke-dasharray="70"  stroke-dashoffset="70"  style="animation:drawV 3s ease-in-out infinite;"/>
        <line x1="15" y1="10" x2="60" y2="10" stroke-dasharray="45"  stroke-dashoffset="45"  style="animation:drawT 3s ease-in-out infinite;"/>
        <line x1="15" y1="45" x2="50" y2="45" stroke-dasharray="35"  stroke-dashoffset="35"  style="animation:drawM 3s ease-in-out infinite;"/>
        <line x1="15" y1="80" x2="60" y2="80" stroke-dasharray="45"  stroke-dashoffset="45"  style="animation:drawB 3s ease-in-out infinite;"/>
      </svg>

      <style>
        @keyframes drawV { 0%{stroke-dashoffset:70} 15%{stroke-dashoffset:0} 88%{stroke-dashoffset:0} 100%{stroke-dashoffset:70} }
        @keyframes drawT { 0%,17%{stroke-dashoffset:45} 27%{stroke-dashoffset:0} 83%{stroke-dashoffset:0} 93%{stroke-dashoffset:45} 100%{stroke-dashoffset:45} }
        @keyframes drawM { 0%,30%{stroke-dashoffset:35} 38%{stroke-dashoffset:0} 79%{stroke-dashoffset:0} 88%{stroke-dashoffset:35} 100%{stroke-dashoffset:35} }
        @keyframes drawB { 0%,38%{stroke-dashoffset:45} 48%{stroke-dashoffset:0} 76%{stroke-dashoffset:0} 84%{stroke-dashoffset:45} 100%{stroke-dashoffset:45} }
        @keyframes neonGlow {
          0%,100% { filter:drop-shadow(0 0 4px #00d4ff) drop-shadow(0 0 14px #00d4ff); }
          50%     { filter:drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 28px #00d4ff) drop-shadow(0 0 50px #00d4ff88); }
        }
      </style>

      <span style="font-family:'Space Grotesk',monospace;font-size:0.58rem;font-weight:600;letter-spacing:0.35em;color:rgba(0,212,255,0.4);text-transform:uppercase;">
        Chargement...
      </span>
    </div>

    <!-- Hidden until fully ready, then revealed with a slide-up + fade -->
    <div id="root" style="visibility:hidden;opacity:0;transition:opacity 0.8s ease;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

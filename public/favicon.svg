<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#05091a"/>

  <!-- Subtle cyan glow -->
  <circle cx="16" cy="16" r="13" fill="#00d5ff" opacity="0.07"/>

  <!-- Letter E built from rectangles -->
  <!-- Vertical bar -->
  <rect x="7" y="6" width="4" height="20" rx="1.5" fill="#00d5ff"/>
  <!-- Top bar -->
  <rect x="7" y="6" width="17" height="4" rx="1.5" fill="#00d5ff"/>
  <!-- Middle bar (slightly shorter) -->
  <rect x="7" y="14" width="13" height="4" rx="1.5" fill="#00d5ff"/>
  <!-- Bottom bar -->
  <rect x="7" y="22" width="17" height="4" rx="1.5" fill="#00d5ff"/>

  <!-- Small accent dot (top-right) -->
  <circle cx="26" cy="6" r="2" fill="#3d8ef0"/>
</svg>
